name: Hurtig deploy (kun frontend)

on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Hent offentligt katalog (uden indkøbspriser)
        run: python hent_offentligt_katalog.py

      - name: Efterbehandl (bl.a. rekategorisering af afløb)
        run: python efterbehandl.py

      - name: Byg offentlig udgave
        run: python byg_deploy.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
